<!DOCTYPE html>
<html lang="en">
<head>

<style>
:root{--bg:#0a0a0a;--ink:#f2f2f2;--dim:#7a7a7a;--faint:#2a2a2a;--red:#e84142;
--mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--mono);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
::selection{background:var(--red);color:#000}

.split{display:flex;height:100dvh;min-height:580px}
.pane{flex:1;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:48px 28px;outline:none;transition:background .18s ease,color .18s ease}
.pane.c{border-right:1px solid var(--faint)}
.eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);margin-bottom:22px}
.big{font-size:clamp(42px,7vw,92px);line-height:.96;letter-spacing:-.01em;font-weight:700}
.c .big{color:var(--red)}
.p .big{color:var(--ink)}
.desc{margin-top:22px;color:var(--dim);font-size:13px;letter-spacing:.04em;max-width:320px;line-height:1.7}
.enter{margin-top:36px;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim);
  border:1px solid var(--faint);padding:11px 20px;display:inline-block;transition:border-color .18s,color .18s}
.pane:hover .enter,.pane:focus-visible .enter{border-color:currentColor;color:currentColor}

/* hover / focus washes — each door lights up in its own colour */
.pane.c:hover,.pane.c:focus-visible{background:var(--red)}
.pane.p:hover,.pane.p:focus-visible{background:var(--ink)}
.pane.c:hover *,.pane.c:focus-visible *,.pane.p:hover *,.pane.p:focus-visible *{color:#0a0a0a!important;border-color:#0a0a0a!important}

/* brand + footer float above both panes and stay legible over any wash */
.brand{position:fixed;top:20px;left:0;right:0;text-align:center;font-size:13px;letter-spacing:.14em;
  font-weight:700;z-index:5;pointer-events:none;mix-blend-mode:difference;color:#fff}
.foot{position:fixed;bottom:18px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;z-index:5;pointer-events:none;mix-blend-mode:difference;color:#fff}

@media(max-width:720px){
  .split{flex-direction:column}
  .pane{padding:40px 24px}
  .pane.c{border-right:none;border-bottom:1px solid var(--faint)}
  .big{font-size:clamp(40px,13vw,72px)}
  .desc{margin-top:16px}
  .enter{margin-top:26px}
}
</style>
</head>
<body>

<div class="brand">AVAX/100M</div>

<main class="split">
  <a class="pane c" href="/c-chain" aria-label="Enter the C-Chain: block 100,000,000 countdown, wallet history and realized P&L">
    <div class="eyebrow">avalanche · c-chain</div>
    <div class="big">C&#8209;CHAIN</div>
    <div class="desc">the countdown to block 100,000,000 · wallet history · realized P&amp;L · survivor cards</div>
    <span class="enter">enter →</span>
  </a>
  <a class="pane p" href="/p-chain" aria-label="Enter the P-Chain: live validators, staking and rewards">
    <div class="eyebrow">avalanche · p-chain</div>
    <div class="big">P&#8209;CHAIN</div>
    <div class="desc">who secures the network · every validator · staking, delegations &amp; rewards</div>
    <span class="enter">enter →</span>
  </a>
</main>

<div class="foot">two chains · one page · no connect, just a read</div>

</body>
</html>
